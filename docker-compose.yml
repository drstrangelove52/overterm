name: overterm

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootchangeme}
      MYSQL_DATABASE: ${DB_NAME:-overterm}
      MYSQL_USER: ${DB_USER:-overterm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    command: >
      --wait_timeout=28800
      --interactive_timeout=28800
      --net_read_timeout=30
      --net_write_timeout=60
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    volumes:
      - /etc/hostname:/etc/hostname:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      LAN_IP: ${LAN_IP}
    ports:
      - "${LAN_IP}:80:80"
      - "${LAN_IP}:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  db_data:
  caddy_data:
  caddy_config:
